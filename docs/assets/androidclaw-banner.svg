<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="15"/>
  
  <!-- Grid pattern -->
  <g stroke="#0f0" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>
  
  <!-- Android Robot -->
  <g transform="translate(80, 40)" filter="url(#glow)">
    <!-- Head -->
    <rect x="15" y="0" width="50" height="45" rx="22" fill="none" stroke="#0f0" stroke-width="3"/>
    <!-- Antennas -->
    <line x1="25" y1="5" x2="15" y2="-10" stroke="#0f0" stroke-width="2"/>
    <line x1="55" y1="5" x2="65" y2="-10" stroke="#0f0" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="30" cy="20" r="4" fill="#0f0"/>
    <circle cx="50" cy="20" r="4" fill="#0f0"/>
    <!-- Body -->
    <rect x="10" y="48" width="60" height="70" rx="5" fill="none" stroke="#0f0" stroke-width="3"/>
    <!-- Arms -->
    <rect x="-15" y="50" width="25" height="50" rx="10" fill="none" stroke="#0f0" stroke-width="3"/>
    <rect x="70" y="50" width="25" height="50" rx="10" fill="none" stroke="#0f0" stroke-width="3"/>
    <!-- Legs -->
    <rect x="20" y="118" width="18" height="40" rx="8" fill="none" stroke="#0f0" stroke-width="3"/>
    <rect x="42" y="118" width="18" height="40" rx="8" fill="none" stroke="#0f0" stroke-width="3"/>
  </g>
  
  <!-- Crab Claw (Rust) -->
  <g transform="translate(170, 60)" filter="url(#glow)">
    <!-- Left claw -->
    <path d="M 0,30 Q 10,20 20,25 L 30,15 Q 40,5 35,0 Q 30,5 20,15 L 10,25" 
          fill="none" stroke="#0f0" stroke-width="2.5"/>
    <!-- Right claw -->
    <path d="M 0,30 Q 10,40 20,35 L 30,45 Q 40,55 35,60 Q 30,55 20,45 L 10,35" 
          fill="none" stroke="#0f0" stroke-width="2.5"/>
    <!-- Body -->
    <ellipse cx="0" cy="30" rx="15" ry="20" fill="none" stroke="#0f0" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="-10" y1="45" x2="-20" y2="55" stroke="#0f0" stroke-width="2"/>
    <line x1="-12" y1="50" x2="-25" y2="58" stroke="#0f0" stroke-width="2"/>
    <line x1="-10" y1="15" x2="-20" y2="5" stroke="#0f0" stroke-width="2"/>
  </g>
  
  <!-- Text: Android -->
  <text x="260" y="75" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0f0" filter="url(#glow)">
    Android
  </text>
  
  <!-- Text: Claw -->
  <text x="260" y="130" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#00ff88" filter="url(#glow)">
    Claw
  </text>
  
  <!-- Tagline -->
  <text x="260" y="160" font-family="monospace" font-size="14" fill="#888">
    Personal AI Assistant for Android
  </text>
  
  <!-- Decorative elements -->
  <circle cx="720" cy="30" r="5" fill="#0f0" opacity="0.5"/>
  <circle cx="750" cy="50" r="3" fill="#0f0" opacity="0.3"/>
  <circle cx="730" cy="70" r="4" fill="#0f0" opacity="0.4"/>
  
  <!-- Binary decoration -->
  <text x="600" y="180" font-family="monospace" font-size="10" fill="#0f0" opacity="0.2">
    100% Rust | Zero Overhead | Agnostic
  </text>
</svg>
